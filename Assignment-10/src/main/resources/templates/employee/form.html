<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::div})}">
<body>
    <div>
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="d-flex align-items-center mb-4">
                    <a th:href="@{/employees}" class="btn btn-sm btn-outline-secondary rounded-circle me-3" style="width: 38px; height: 38px; padding-top: 6px;">
                        <i class="bi bi-arrow-left"></i>
                    </a>
                    <div>
                        <h2 class="fw-bold text-dark mb-1" th:text="${employee.id == null ? 'Add New Employee' : 'Edit Employee'}">Add Employee</h2>
                        <p class="text-muted mb-0">Fill in the necessary details below.</p>
                    </div>
                </div>

                <div class="card border-0 shadow-sm rounded-4">
                    <div class="card-body p-4 p-md-5">
                        <form th:action="@{/employees}" th:object="${employee}" method="post" class="needs-validation">
                            <input type="hidden" th:field="*{id}">
                            
                            <div class="row g-4">
                                <div class="col-md-12">
                                    <label for="name" class="form-label fw-semibold">Full Name</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light border-end-0"><i class="bi bi-person text-muted"></i></span>
                                        <input type="text" class="form-control border-start-0 ps-0" id="name" th:field="*{name}" placeholder="Dr. John Doe" required>
                                    </div>
                                </div>
                                
                                <div class="col-md-6">
                                    <label for="department" class="form-label fw-semibold">Department</label>
                                    <select class="form-select" id="department" th:field="*{department}" required>
                                        <option value="" disabled selected>Select Department...</option>
                                        <option value="Computer Engineering">Computer Engineering</option>
                                        <option value="IT Engineering">IT Engineering</option>
                                        <option value="Mechanical Engineering">Mechanical Engineering</option>
                                        <option value="Civil Engineering">Civil Engineering</option>
                                        <option value="Electronics & Telecomm">Electronics & Telecomm</option>
                                        <option value="First Year Dept">First Year Dept</option>
                                    </select>
                                </div>
                                
                                <div class="col-md-6">
                                    <label for="designation" class="form-label fw-semibold">Designation</label>
                                    <input type="text" class="form-control" id="designation" th:field="*{designation}" placeholder="Assistant Professor" required>
                                </div>

                                <div class="col-md-12">
                                    <label for="email" class="form-label fw-semibold">Email Address</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light border-end-0"><i class="bi bi-envelope text-muted"></i></span>
                                        <input type="email" class="form-control border-start-0 ps-0" id="email" th:field="*{email}" placeholder="john.doe@college.edu" required>
                                    </div>
                                </div>
                            </div>

                            <hr class="my-4 text-muted opacity-25">

                            <div class="d-flex justify-content-end gap-3 mt-4">
                                <a th:href="@{/employees}" class="btn btn-light rounded-pill px-4 hover-lift">Cancel</a>
                                <button type="submit" class="btn btn-primary rounded-pill px-5 shadow-sm hover-lift">
                                    <i class="bi bi-check2-circle me-2"></i><span th:text="${employee.id == null ? 'Save Employee' : 'Update Details'}">Save</span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::div})}">
<body>
    <div>
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2 class="fw-bold text-dark mb-1">Task Management</h2>
                <p class="text-muted mb-0">Track and assign faculty duties</p>
            </div>
            <a th:href="@{/tasks/new}" class="btn btn-warning text-dark fw-medium rounded-pill px-4 py-2 hover-lift">
                <i class="bi bi-plus-lg me-2"></i> Assign Task
            </a>
        </div>

        <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0 custom-table">
                        <thead class="bg-light">
                            <tr>
                                <th class="ps-4">No.</th>
                                <th>Task Details</th>
                                <th>Assigned To</th>
                                <th>Type</th>
                                <th>Due Date</th>
                                <th>Status</th>
                                <th class="text-end pe-4">Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:if="${#lists.isEmpty(tasks)}">
                                <td colspan="7" class="text-center py-5 text-muted">
                                    <div class="d-flex flex-column align-items-center">
                                        <i class="bi bi-clipboard-x fs-1 text-light mb-2"></i>
                                        <p>No tasks assigned yet. Create the first task!</p>
                                    </div>
                                </td>
                            </tr>
                            <tr th:each="task, stat : ${tasks}">
                                <td class="ps-4 text-muted fw-medium" th:text="${stat.count}">1</td>
                                <td>
                                    <div class="fw-bold text-dark" th:text="${task.title}">Internal Exam Duty</div>
                                    <small class="text-muted text-truncate d-inline-block" style="max-width: 200px;" th:text="${task.description}">Invigilation duty for CC exam.</small>
                                </td>
                                <td>
                                    <div class="d-flex align-items-center" th:if="${task.employee != null}">
                                        <div class="avatar-sm bg-primary-subtle text-primary me-2 fw-bold" th:text="${#strings.substring(task.employee.name,0,1)}">A</div>
                                        <span class="fw-medium" th:text="${task.employee.name}">John Doe</span>
                                    </div>
                                    <span class="text-muted fst-italic" th:if="${task.employee == null}">Unassigned</span>
                                </td>
                                <td>
                                    <span class="badge bg-secondary-subtle text-secondary rounded-pill px-3 py-1" th:text="${task.taskType}">Exam Duty</span>
                                </td>
                                <td>
                                    <span class="text-muted"><i class="bi bi-calendar-check me-1"></i></span>
                                    <span th:text="${task.dueDate}">2026-05-10</span>
                                </td>
                                <td>
                                    <span class="badge rounded-pill px-3 py-2 fw-medium"
                                          th:classappend="${task.status == 'Pending' ? 'bg-danger-subtle text-danger' : (task.status == 'In Progress' ? 'bg-warning-subtle text-warning' : 'bg-success-subtle text-success')}"
                                          th:text="${task.status}">Pending</span>
                                </td>
                                <td class="text-end pe-4">
                                    <div class="btn-group">
                                        <a th:href="@{/tasks/edit/{id}(id=${task.id})}" class="btn btn-sm btn-outline-warning rounded-start-pill px-3" title="Edit">
                                            <i class="bi bi-pencil-square"></i>
                                        </a>
                                        <a th:href="@{/tasks/delete/{id}(id=${task.id})}" class="btn btn-sm btn-outline-danger rounded-end-pill px-3" title="Delete" onclick="return confirm('Are you sure you want to delete this task?');">
                                            <i class="bi bi-trash"></i>
                                        </a>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::div})}">
<body>
    <div>
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2 class="fw-bold text-dark mb-1">Faculty Directory</h2>
                <p class="text-muted mb-0">Manage teaching and non-teaching staff</p>
            </div>
            <a th:href="@{/employees/new}" class="btn btn-primary rounded-pill px-4 py-2 hover-lift">
                <i class="bi bi-plus-lg me-2"></i> Add Employee
            </a>
        </div>

        <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0 custom-table">
                        <thead class="bg-light">
                            <tr>
                                <th class="ps-4">ID</th>
                                <th>Name</th>
                                <th>Department</th>
                                <th>Designation</th>
                                <th>Email</th>
                                <th class="text-end pe-4">Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:if="${#lists.isEmpty(employees)}">
                                <td colspan="6" class="text-center py-5 text-muted">
                                    <div class="d-flex flex-column align-items-center">
                                        <i class="bi bi-people fs-1 text-light mb-2"></i>
                                        <p>No employees found. Add your first employee!</p>
                                    </div>
                                </td>
                            </tr>
                            <tr th:each="employee : ${employees}">
                                <td class="ps-4 text-muted fw-medium" th:text="${employee.id}">1</td>
                                <td>
                                    <div class="d-flex align-items-center">
                                        <div class="avatar-circle bg-primary-subtle text-primary me-3 fw-bold" th:text="${#strings.substring(employee.name,0,1)}">A</div>
                                        <div class="fw-semibold text-dark" th:text="${employee.name}">John Doe</div>
                                    </div>
                                </td>
                                <td>
                                    <span class="badge bg-secondary-subtle text-secondary rounded-pill px-3 py-2 fw-medium" th:text="${employee.department}">Computer Engineering</span>
                                </td>
                                <td th:text="${employee.designation}">Assistant Professor</td>
                                <td class="text-muted" th:text="${employee.email}">john@college.edu</td>
                                <td class="text-end pe-4">
                                    <div class="btn-group">
                                        <a th:href="@{/employees/edit/{id}(id=${employee.id})}" class="btn btn-sm btn-outline-primary rounded-start-pill px-3" title="Edit">
                                            <i class="bi bi-pencil-square"></i>
                                        </a>
                                        <a th:href="@{/employees/delete/{id}(id=${employee.id})}" class="btn btn-sm btn-outline-danger rounded-end-pill px-3" title="Delete" onclick="return confirm('Are you sure you want to delete this employee?');">
                                            <i class="bi bi-trash"></i>
                                        </a>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
